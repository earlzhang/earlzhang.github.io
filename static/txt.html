<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本整理器 by 张翼轸</title>
    <link rel="icon" type="image/x-icon" href="favicon/txtfavicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="favicon/txtfavicon/favicon.svg">

<body data-theme="winter" class="h-screen bg-slate-50 text-slate-800 selection:bg-blue-200 overflow-hidden">
    <main class="mx-auto w-full max-w-6xl p-2 md:p-3 h-full flex flex-col">

        <header class="mb-2 flex items-baseline justify-center gap-2 text-center shrink-0">

                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
                文本整理器
            </h1>
            <span class="text-slate-400 text-xs font-medium">by 张翼轸</span>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col lg:flex-row flex-1">
            
            <!-- Sidebar / Toolbar -->
            <aside class="w-full lg:w-[320px] bg-slate-50/80 p-4 border-b lg:border-b-0 lg:border-r border-slate-200 overflow-y-auto shrink-0 flex flex-col gap-5">
                <div class="flex items-center gap-2">

                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        粘贴
                    </button>
                    <button id="copyButton" class="btn btn-xs h-7 px-3 bg-blue-500 hover:bg-blue-600 text-white border-none shadow-sm shadow-blue-500/20 font-medium transition-colors gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                        复制
                    </button>
                </div>
                <hr class="border-slate-200/60" />

                <!-- Group 1: 段落排版 -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" /></svg>
                        段落排版
                    </h3>
                    <div class="grid grid-cols-2 gap-2">

                        <button id="indentParagraphs" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">段首缩进</button>
                        <button id="mergeEmptyLines" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">合并空行</button>

                    </div>
                </div>

                <!-- Group 3: 引号处理 -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
                        引号处理
                    </h3>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="convertQuotes" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">双半转全</button>
                        <button id="convertSingleQuotes" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">单半转全</button>
                        <button id="convertDoubleFullToCorner" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">全双转「」</button>
                        <button id="convertSingleFullToDoubleCorner" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">全单转『』</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="unifyToFullDoubleQuotes" class="btn btn-sm h-9 bg-blue-500 hover:bg-blue-600 text-white border-none font-medium transition-colors">统一成“”</button>
                        <button id="unifyToVerticalDoubleQuotes" class="btn btn-sm h-9 bg-blue-500 hover:bg-blue-600 text-white border-none font-medium transition-colors">统一成「」</button>
                    </div>
                </div>

                <!-- Group 2: 基础标点 -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" /></svg>
                        基础标点 (半转全)
                    </h3>
                    <div class="join w-full mb-2">
                        <button id="convertComma" class="btn btn-sm h-9 join-item flex-1 bg-white border-slate-200 text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">，</button>
                        <button id="convertPeriod" class="btn btn-sm h-9 join-item flex-1 bg-white border-slate-200 text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">。</button>
                        <button id="convertColon" class="btn btn-sm h-9 join-item flex-1 bg-white border-slate-200 text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">：</button>
                        <button id="convertQuestion" class="btn btn-sm h-9 join-item flex-1 bg-white border-slate-200 text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">？</button>
                        <button id="convertExclamation" class="btn btn-sm h-9 join-item flex-1 bg-white border-slate-200 text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors">！</button>
                    </div>
                    <button id="convertAllPunctuation" class="btn btn-sm h-9 w-full bg-blue-50 hover:bg-blue-100 text-blue-600 border-blue-200 hover:border-blue-300 font-medium transition-colors">同时整理以上五种</button>
                </div>

                <!-- Group 4: 其他转换 -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
                        其他转换
                    </h3>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="convertBracketsFullToHalf" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">括号转半</button>
                        <button id="convertBracketsHalfToFull" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">括号转全</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="convertTraditionalQuotes" class="btn btn-sm h-9 bg-white hover:bg-slate-100 hover:border-slate-300 border-slate-200 text-slate-600 font-normal transition-all">繁引号转简</button>
                        <button id="t2s" class="btn btn-sm h-9 bg-emerald-500 hover:bg-emerald-600 text-white border-none font-medium transition-colors">繁体转简体</button>
                    </div>
                </div>
            </aside>

            <!-- Content Area -->
            <section class="flex-1 flex flex-col bg-white overflow-hidden relative">
                <!-- Editor Toolbar -->
                <div class="h-11 bg-slate-50/40 border-b border-slate-100 flex items-center justify-between px-4 shrink-0">
                    <span class="text-xs font-medium text-slate-400 flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        编辑区
                    </span>
                    <span id="wordCount" class="text-xs font-medium text-slate-400 tabular-nums">字数：0</span>
                </div>
                
                <div class="flex-1 relative p-4 md:p-6 overflow-hidden">
                    <textarea id="textArea" class="w-full h-full text-base leading-relaxed text-slate-700 bg-transparent border-0 focus:ring-0 resize-none outline-none placeholder:text-slate-300" placeholder="请在此处输入需要整理的文本..."></textarea>
                </div>
            </section>
        </div>
    </main>

    <!-- 使用本地已有的 OpenCC 库，避免 CDN 加载失败 -->
    <script src="full.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const textArea = document.getElementById('textArea');
            const wordCount = document.getElementById('wordCount');
            
            // 调试日志：检查库加载状态
            console.log('OpenCC defined:', typeof OpenCC !== 'undefined');
            let lastCountText = null;

            function getCharCount(text) {
                const normalized = (text || '').replace(/\s/g, '');
                return Array.from(normalized).length;
            }

            function updateWordCount() {
                if (!wordCount) {
                    return;
                }
                const currentText = textArea.value;
                if (currentText === lastCountText) {
                    return;
                }
                lastCountText = currentText;
                wordCount.textContent = `字数：${getCharCount(currentText)}`;
            }

            textArea.addEventListener('input', updateWordCount);
            updateWordCount();
            setInterval(updateWordCount, 200);
            
            // 去除段落首尾空格
            document.getElementById('trimParagraphs').addEventListener('click', function() {
                const text = textArea.value;
                const paragraphs = text.split('\n');
                const trimmedParagraphs = paragraphs.map(p => p.trim());
                textArea.value = trimmedParagraphs.join('\n');
            });
            
            // 段首缩进两个全角空格
            document.getElementById('indentParagraphs').addEventListener('click', function() {
                const text = textArea.value;
                const paragraphs = text.split('\n');
                const indentedParagraphs = paragraphs.map(p => {
                    if (p.trim().length > 0) {
                        return '　　' + p.trim();
                    }
                    return p;
                });
                textArea.value = indentedParagraphs.join('\n');
            });
            
            // 合并段落之间空行
            document.getElementById('mergeEmptyLines').addEventListener('click', function() {
                const text = textArea.value;
                // 将连续的空行替换为单个空行，然后移除所有空行
                const processedText = text.replace(/\n\s*\n/g, '\n');
                textArea.value = processedText;
            });
            
            // 只空一行
            document.getElementById('singleEmptyLine').addEventListener('click', function() {
                const text = textArea.value;
                // 首先确保每个非空段落后面有一个空行
                let processedText = text.replace(/([^\s][^\n]*)(\n)([^\s])/g, '$1\n\n$3');
                // 然后将连续的空行替换为单个空行
                processedText = processedText.replace(/\n\s*\n/g, '\n\n');
                textArea.value = processedText;
            });
            
            // ── Markdown 保护机制 ──────────────────────────────────────────
            // 在标点转换前，将不应被转换的区域替换为占位符，转换后再还原。
            // 保护范围：
            //   1. fenced 代码块（```lang\n...\n```）
            //   2. 行内代码（`code`）
            //   3. Markdown 链接/图片的 URL 部分：[text](url) 或 ![alt](url)
            //   4. 裸 URL（http:// / https://）
            function withMarkdownProtection(text, transformFn) {
                const placeholders = [];

                function protect(str) {
                    const id = `\x00MDPROTECT${placeholders.length}\x00`;
                    placeholders.push(str);
                    return id;
                }

                // 1. 保护 fenced 代码块（```...```）
                let result = text.replace(/```[\s\S]*?```/g, match => protect(match));

                // 2. 保护行内代码（`...`），支持多个反引号作开闭
                result = result.replace(/`+[^`]+`+/g, match => protect(match));

                // 3. 保护 Markdown 链接/图片的 URL 部分：[text](url) 或 ![alt](url)
                //    只保护 (url) 部分，允许 [text] 部分被转换
                result = result.replace(/(!?\[[^\]]*\])\(([^)]*)\)/g, (match, p1, p2) => {
                    return p1 + '(' + protect(p2) + ')';
                });

                // 4. 保护裸 URL（http:// 或 https://，直到遇到空白或中文字符）
                result = result.replace(/https?:\/\/[^\s\u4e00-\u9fff]*/g, match => protect(match));

                // 执行转换
                result = transformFn(result);

                // 还原占位符
                result = result.replace(/\x00MDPROTECT(\d+)\x00/g, (match, idx) => {
                    return placeholders[parseInt(idx)];
                });

                return result;
            }
            // ─────────────────────────────────────────────────────────────────

            // 定义可复用的标点转换函数
            // 半角逗号转全角逗号
            function convertComma(text) {
                return text.replace(/,/g, '，');
            }
            
            // 半角句号转全角句号，保持数字之间的半角句号不变
            function convertPeriod(text) {
                let result = '';
                let i = 0;
                
                while (i < text.length) {
                    if (text[i] === '.' && 
                        i > 0 && /\d/.test(text[i-1]) && 
                        i < text.length - 1 && /\d/.test(text[i+1])) {
                        // 如果句号前后都是数字，保持原样
                        result += '.';
                    } else if (text[i] === '.') {
                        // 其他情况下转换为全角句号
                        result += '。';
                    } else {
                        result += text[i];
                    }
                    i++;
                }
                
                return result;
            }
            
            // 半角冒号转全角冒号
            function convertColon(text) {
                return text.replace(/:/g, '：');
            }
            
            // 半角问号转全角问号
            function convertQuestion(text) {
                return text.replace(/\?/g, '？');
            }
            
            // 半角感叹号转全角感叹号
            function convertExclamation(text) {
                return text.replace(/!/g, '！');
            }
            
            // 半角双引号转全角双引号
            function convertQuotes(text) {
                const chineseChar = /[\u4e00-\u9fff]/;
                let isOpen = true;

                // 查找所有双引号并替换
                return text.replace(/"/g, function(char, offset) {
                    const prevChar = offset > 0 ? text[offset - 1] : '';
                    const nextChar = offset < text.length - 1 ? text[offset + 1] : '';

                    // 英制单位写法保留，如 12"、12"x
                    if (/\d/.test(prevChar) && !chineseChar.test(nextChar)) {
                        return char;
                    }

                    const quote = isOpen ? '\u201c' : '\u201d';
                    isOpen = !isOpen;
                    return quote;
                });
            }
            
            // 半角单引号转全角单引号
            function convertSingleQuotes(text) {
                let isOpen = true;

                // 查找所有单引号并替换
                return text.replace(/'/g, function(char, offset) {
                    const prevChar = offset > 0 ? text[offset - 1] : '';
                    const nextChar = offset < text.length - 1 ? text[offset + 1] : '';

                    // 英文撇号用法保留，如 Don't、O'Reilly、it's
                    if (/[A-Za-z]/.test(prevChar) && /[A-Za-z]/.test(nextChar)) {
                        return char;
                    }

                    const quote = isOpen ? '\u2018' : '\u2019';
                    isOpen = !isOpen;
                    return quote;
                });
            }

            // 全角双引号对转「」
            function convertDoubleFullQuotesToCorner(text) {
                return text
                    .replace(/“/g, '「')
                    .replace(/”/g, '」');
            }

            // 全角单引号对转『』
            function convertSingleFullQuotesToDoubleCorner(text) {
                return text
                    .replace(/‘/g, '『')
                    .replace(/’/g, '』');
            }

            function unifyQuotesInSegment(segment, style) {
                const quotePattern = /["'“”‘’「」『』]/g;
                const openingQuotes = new Set(['“', '‘', '「', '『']);
                const closingQuotes = new Set(['”', '’', '」', '』']);
                const asciiWordChar = /[A-Za-z0-9]/;
                const chineseChar = /[\u4e00-\u9fff]/;
                const pairMap = style === 'vertical'
                    ? {
                        outerOpen: '「',
                        outerClose: '」',
                        innerOpen: '『',
                        innerClose: '』'
                    }
                    : {
                        outerOpen: '“',
                        outerClose: '”',
                        innerOpen: '‘',
                        innerClose: '’'
                    };

                let depth = 0;

                function hasChineseWrappedBySameHalfQuote(quoteChar, offset) {
                    const nextPos = segment.indexOf(quoteChar, offset + 1);
                    if (nextPos !== -1 && chineseChar.test(segment.slice(offset + 1, nextPos))) {
                        return true;
                    }

                    const prevPos = segment.lastIndexOf(quoteChar, offset - 1);
                    if (prevPos !== -1 && chineseChar.test(segment.slice(prevPos + 1, offset))) {
                        return true;
                    }

                    return false;
                }

                return segment.replace(quotePattern, function(char, offset) {
                    const prevChar = offset > 0 ? segment[offset - 1] : '';
                    const nextChar = offset < segment.length - 1 ? segment[offset + 1] : '';

                    // 半角引号仅处理“包裹中文”的场景；英文/数字包裹保持原样
                    if ((char === '"' || char === "'") && !hasChineseWrappedBySameHalfQuote(char, offset)) {
                        return char;
                    }

                    // 英文/数字黏连场景忽略（收紧条件，避免误伤“1000个铁杆粉丝”）
                    // 1) 单引号：仅在英文字母中间视为撇号，如 O'Reilly
                    if (char === "'" && /[A-Za-z]/.test(prevChar) && /[A-Za-z]/.test(nextChar)) {
                        return char;
                    }
                    // 2) 双引号：数字后的英制单位写法保留，如 12"、12"x
                    if (char === '"' && /\d/.test(prevChar) && !chineseChar.test(nextChar)) {
                        return char;
                    }

                    const isEndOfText = offset === segment.length - 1;
                    // 引号后若接常见收尾标点（含中英文标点、破折号、省略号）通常应判定为闭引号
                    const likelyClosingByContext = isEndOfText || /[，。！？：；、）】〉》」』,.!?:;)\]}>\s—…]/.test(nextChar);
                    const likelyClosingByWordWrap =
                        depth > 0 && /[\u4e00-\u9fffA-Za-z0-9]/.test(prevChar) && /[\u4e00-\u9fffA-Za-z0-9]/.test(nextChar);

                    if (openingQuotes.has(char)) {
                        const quote = depth % 2 === 0 ? pairMap.outerOpen : pairMap.innerOpen;
                        depth += 1;
                        return quote;
                    }

                    if (closingQuotes.has(char)) {
                        if (depth > 0) {
                            depth -= 1;
                        }
                        return depth % 2 === 0 ? pairMap.outerClose : pairMap.innerClose;
                    }

                    // 半角引号没有开闭信息：优先依据上下文判断，兜底按层级开闭
                    if (depth > 0 && (likelyClosingByContext || likelyClosingByWordWrap)) {
                        depth -= 1;
                        return depth % 2 === 0 ? pairMap.outerClose : pairMap.innerClose;
                    }

                    const quote = depth % 2 === 0 ? pairMap.outerOpen : pairMap.innerOpen;
                    depth += 1;
                    return quote;
                });
            }

            function unifyQuotesWithHierarchy(text, style) {
                // 按段（按行）独立处理，避免长文中跨段引号状态相互干扰
                return text
                    .split('\n')
                    .map(segment => segment ? unifyQuotesInSegment(segment, style) : segment)
                    .join('\n');
            }

            // 所有单/双引号统一为中文弯引号（含内层单引号）
            function unifyAllQuotesToFullDouble(text) {
                return unifyQuotesWithHierarchy(text, 'full');
            }

            // 所有单/双引号统一为竖排中文引号（含内层单引号）
            function unifyAllQuotesToVerticalDouble(text) {
                return unifyQuotesWithHierarchy(text, 'vertical');
            }
            
            // 全角括号转半角括号
            function convertBracketsFullToHalf(text) {
                return text
                    .replace(/（/g, '(')
                    .replace(/）/g, ')')
                    .replace(/【/g, '[')
                    .replace(/】/g, ']')
                    .replace(/〈/g, '<')
                    .replace(/〉/g, '>')
                    .replace(/《/g, '<<')
                    .replace(/》/g, '>>')
                    .replace(/「/g, '{')
                    .replace(/」/g, '}');
            }
            
            // 半角括号转全角括号
            function convertBracketsHalfToFull(text) {
                return text
                    .replace(/\(/g, '（')
                    .replace(/\)/g, '）')
                    .replace(/\[/g, '【')
                    .replace(/]/g, '】')
                    .replace(/</g, '〈')
                    .replace(/>/g, '〉')
                    .replace(/<</g, '《')
                    .replace(/>>/g, '》')
                    .replace(/\{/g, '「')
                    .replace(/\}/g, '」');
            }

            // 繁体引号转简体引号
            function convertTraditionalQuotesToSimplified(text) {
                return text
                    .replace(/「/g, '“')
                    .replace(/」/g, '”')
                    .replace(/『/g, '‘')
                    .replace(/』/g, '’');
            }
            
            // 绑定按钮事件
            document.getElementById('convertComma').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertComma);
            });
            
            document.getElementById('convertPeriod').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertPeriod);
            });
            
            document.getElementById('convertColon').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertColon);
            });
            
            document.getElementById('convertQuestion').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertQuestion);
            });
            
            document.getElementById('convertExclamation').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertExclamation);
            });
            
            document.getElementById('convertQuotes').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, text => {
                    text = convertQuotes(text);
                    text = convertSingleQuotes(text);
                    return text;
                });
            });
            
            document.getElementById('convertSingleQuotes').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertSingleQuotes);
            });

            document.getElementById('convertDoubleFullToCorner').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertDoubleFullQuotesToCorner);
            });

            document.getElementById('convertSingleFullToDoubleCorner').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertSingleFullQuotesToDoubleCorner);
            });

            document.getElementById('unifyToFullDoubleQuotes').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, unifyAllQuotesToFullDouble);
            });

            document.getElementById('unifyToVerticalDoubleQuotes').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, unifyAllQuotesToVerticalDouble);
            });
            
            // 括号转换按钮事件
            document.getElementById('convertBracketsFullToHalf').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertBracketsFullToHalf);
            });
            
            document.getElementById('convertBracketsHalfToFull').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertBracketsHalfToFull);
            });

            document.getElementById('convertTraditionalQuotes').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, convertTraditionalQuotesToSimplified);
            });
            
            // 同时整理以上五种标点符号
            document.getElementById('convertAllPunctuation').addEventListener('click', function() {
                textArea.value = withMarkdownProtection(textArea.value, text => {
                    text = convertComma(text);
                    text = convertColon(text);
                    text = convertQuestion(text);
                    text = convertExclamation(text);
                    text = convertPeriod(text); // 最后处理句号，因为它的逻辑比较复杂
                    return text;
                });
            });

            // 繁体转简体
            document.getElementById('t2s').addEventListener('click', function() {
                try {
                    const globalOpenCC = window.OpenCC || OpenCC;
                    if (typeof globalOpenCC === 'undefined' || !globalOpenCC.Converter) {
                        throw new Error('OpenCC 库未加载。请确保目录下存在 full.min.js。');
                    }
                    
                    // 1.0.5 版本建议使用 tw -> cn
                    const converter = globalOpenCC.Converter({ from: 'tw', to: 'cn' });
                    
                    textArea.value = withMarkdownProtection(textArea.value, text => {
                        let converted = converter(text);
                        converted = convertTraditionalQuotesToSimplified(converted);
                        return converted;
                    });
                } catch (err) {
                    console.error('繁体转简体失败:', err);
                    alert('繁体转简体失败: ' + err.message);
                }
            });
            
            // 复制和粘贴功能
            document.getElementById('copyButton').addEventListener('click', function() {
                textArea.select();
                document.execCommand('copy');
                // 现代方法，兼容性更好
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(textArea.value)
                        .then(() => {
                            // 复制成功，可以添加一些反馈
                            const originalText = document.getElementById('copyButton').textContent;
                            document.getElementById('copyButton').textContent = '已复制';
                            setTimeout(() => {
                                document.getElementById('copyButton').textContent = originalText;
                            }, 1000);
                        })
                        .catch(err => {
                            console.error('复制失败: ', err);
                        });
                }
            });
            
            document.getElementById('pasteButton').addEventListener('click', function() {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    navigator.clipboard.readText()
                        .then(text => {
                            textArea.value = text;
                            // 粘贴成功，可以添加一些反馈
                            const originalText = document.getElementById('pasteButton').textContent;
                            document.getElementById('pasteButton').textContent = '已粘贴';
                            setTimeout(() => {
                                document.getElementById('pasteButton').textContent = originalText;
                            }, 1000);
                        })
                        .catch(err => {
                            console.error('粘贴失败: ', err);
                            alert('无法访问剪贴板，请手动粘贴或检查浏览器权限。');
                        });
                } else {
                    alert('您的浏览器不支持剪贴板访问，请手动粘贴。');
                }
            });
        });
    </script>
</body>
</html>
